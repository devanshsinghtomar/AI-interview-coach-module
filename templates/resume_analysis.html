{% extends "base.html" %}

{% block title %}Resume Analysis - AI Interview Coach{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="card" style="padding: 2rem; text-align: center;">
        <div style="font-size: 4rem; margin-bottom: 1rem;">📄</div>
        <h2 style="margin-bottom: 1rem;">Resume Analysis</h2>
        <p style="color: #666; margin-bottom: 2rem;">Upload your resume (PDF format) for AI-powered analysis</p>
        
        <form method="POST" enctype="multipart/form-data">
            <div style="border: 2px dashed #cbd5e0; border-radius: 10px; padding: 2rem; margin-bottom: 1.5rem; cursor: pointer;" onclick="document.getElementById('fileInput').click()">
                <div style="font-size: 3rem; margin-bottom: 0.5rem;">📁</div>
                <p>Click to upload or drag and drop</p>
                <p style="font-size: 0.875rem; color: #666; margin-top: 0.5rem;">PDF files only (Max 5MB)</p>
                <input type="file" name="resume" id="fileInput" accept=".pdf" style="display: none;" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Analyze Resume →</button>
        </form>
    </div>
</div>

<script>
    document.getElementById('fileInput').addEventListener('change', function(e) {
        if (e.target.files[0]) {
            alert(`Selected: ${e.target.files[0].name}`);
        }
    });
</script>
{% endblock %}
