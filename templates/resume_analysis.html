{% extends "base.html" %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="card" style="padding: 2rem; text-align: center;">
        <div style="font-size: 4rem;">📄</div>
        <h2>Resume Analysis</h2>
        <p>Upload your PDF resume</p>
        
        <form method="POST" enctype="multipart/form-data">
            <div style="border: 2px dashed #cbd5e0; border-radius: 10px; padding: 2rem; margin: 1rem 0; cursor: pointer;" onclick="document.getElementById('file').click()">
                <div id="fileName">Click or drag PDF here</div>
                <input type="file" name="resume" id="file" accept=".pdf" style="display: none;" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Analyze</button>
        </form>
    </div>
</div>

<script>
document.getElementById('file').onchange = (e) => {
    if (e.target.files[0]) {
        document.getElementById('fileName').innerHTML = `✅ ${e.target.files[0].name}`;
    }
};
</script>
{% endblock %}
