{% extends "base.html" %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="card" style="padding: 2rem; text-align: center;">
        <div style="font-size: 4rem;">📄</div>
        <h2>Resume Analysis</h2>
        <p>Upload your resume (PDF format) for AI-powered analysis</p>
        
        <form id="uploadForm" method="POST" enctype="multipart/form-data">
            <div id="dropZone" style="border: 2px dashed #cbd5e0; border-radius: 10px; padding: 2rem; margin: 1rem 0; cursor: pointer;">
                <div id="uploadIcon" style="font-size: 3rem;">📁</div>
                <p id="uploadText">Click or drag to upload PDF</p>
                <p style="font-size: 0.875rem; color: #666;">PDF files only (Max 5MB)</p>
                <input type="file" name="resume" id="fileInput" accept=".pdf" style="display: none;" required>
            </div>
            <button type="submit" id="submitBtn" class="btn btn-primary" style="width: 100%;">Analyze Resume</button>
        </form>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const uploadText = document.getElementById('uploadText');
    const uploadIcon = document.getElementById('uploadIcon');
    const submitBtn = document.getElementById('submitBtn');
    
    dropZone.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) {
            const fileName = e.target.files[0].name;
            uploadText.innerHTML = `✅ Selected: ${fileName}`;
            uploadIcon.innerHTML = '✅';
            dropZone.style.borderColor = '#48bb78';
            submitBtn.disabled = false;
        }
    });
    
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#667eea';
    });
    
    dropZone.addEventListener('dragleave', () => {
        dropZone.style.borderColor = '#cbd5e0';
    });
    
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file && file.name.endsWith('.pdf')) {
            fileInput.files = e.dataTransfer.files;
            uploadText.innerHTML = `✅ Selected: ${file.name}`;
            uploadIcon.innerHTML = '✅';
            dropZone.style.borderColor = '#48bb78';
            submitBtn.disabled = false;
        } else {
            alert('Please upload a PDF file');
        }
    });
</script>
{% endblock %}
