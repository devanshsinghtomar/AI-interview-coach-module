{% extends "base.html" %}

{% block title %}Login - AI Interview Coach{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 0 auto;">
    <div class="card fade-in">
        <div class="card-header">
            <h2 style="margin: 0; text-align: center;">🔐 Login</h2>
            <p style="text-align: center; color: var(--gray-600); margin-top: 0.5rem;">
                Welcome back! Please login to continue
            </p>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="Enter your password">
                </div>
                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" name="remember"> Remember Me
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                    Login →
                </button>
            </form>
        </div>
        <div class="card-footer" style="text-align: center;">
            <p style="margin: 0;">
                Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary-color);">Register here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
