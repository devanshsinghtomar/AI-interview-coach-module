<!-- templates/login.html -->
{% extends "base.html" %}
{% block content %}
<div style="max-width: 450px; margin: 2rem auto;">
    <div class="card" style="padding: 2rem;">
        <h2 style="text-align: center;">Login</h2>
        <form method="POST">
            <div class="form-group"><label>Username</label><input type="text" name="username" class="form-control" required></div>
            <div class="form-group"><label>Password</label><input type="password" name="password" class="form-control" required></div>
            <div class="form-group"><label><input type="checkbox" name="remember"> Remember me</label></div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
        <p style="text-align: center; margin-top: 1rem;">Don't have an account? <a href="/register">Register</a></p>
    </div>
</div>
{% endblock %}
