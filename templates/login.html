{# templates/login.html #}
{% extends "base.html" %}

{% block title %}Login - AI Interview Coach{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 2rem auto;">
    <div class="card" style="padding: 2rem;">
        <h2 style="text-align: center; margin-bottom: 1rem;">Welcome Back! 👋</h2>
        <p style="text-align: center; color: #666; margin-bottom: 2rem;">Login to continue your interview preparation</p>
        
        <form method="POST">
            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Username</label>
                <input type="text" name="username" required style="width: 100%; padding: 0.75rem; border: 2px solid #e2e8f0; border-radius: 10px;">
            </div>
            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Password</label>
                <input type="password" name="password" required style="width: 100%; padding: 0.75rem; border: 2px solid #e2e8f0; border-radius: 10px;">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" name="remember"> Remember me
                </label>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login →</button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem;">
            Don't have an account? <a href="/register" style="color: #667eea;">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
