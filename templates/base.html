<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Career Assistant Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .drag-active { background-color: #e0e7ff; border-color: #3b82f6; }
        .transition-all { transition: all 0.3s ease; }
        .sidebar-item:hover { background-color: #f3f4f6; transform: translateX(4px); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100">
    <div class="flex h-screen">
        <div class="w-64 bg-white shadow-xl z-10">
            <div class="p-6 border-b">
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">AI Career Hub</h1>
                <p class="text-xs text-gray-500 mt-1">Your Career Assistant</p>
            </div>
            <nav class="p-4 space-y-2">
                <a href="#" onclick="showSection('dashboard')" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-blue-50 transition-all"><i class="fas fa-chart-line text-blue-500"></i><span>Dashboard</span></a>
                <a href="#" onclick="showSection('mockInterview')" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-blue-50 transition-all"><i class="fas fa-microphone-alt text-green-500"></i><span>Mock Interview</span></a>
                <a href="#" onclick="showSection('resumeAnalysis')" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-blue-50 transition-all"><i class="fas fa-file-alt text-purple-500"></i><span>Resume Analysis</span></a>
                <a href="#" onclick="showSection('skillQuiz')" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-blue-50 transition-all"><i class="fas fa-brain text-orange-500"></i><span>Skill Quiz</span></a>
                <a href="#" onclick="showSection('performance')" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-blue-50 transition-all"><i class="fas fa-chart-pie text-red-500"></i><span>Performance</span></a>
            </nav>
        </div>
        <div class="flex-1 overflow-y-auto">
            <div class="p-8">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
    <script>
        function showSection(sectionId) {
            const sections = ['dashboard', 'mockInterview', 'resumeAnalysis', 'skillQuiz', 'performance'];
            sections.forEach(id => {
                const el = document.getElementById(id + 'Section');
                if (el) el.classList.add('hidden');
            });
            const active = document.getElementById(sectionId + 'Section');
            if (active) active.classList.remove('hidden');
            if (sectionId === 'performance' && typeof updateAllCharts === 'function') updateAllCharts();
        }
        document.addEventListener('DOMContentLoaded', function() { showSection('dashboard'); });
    </script>
</body>
</html>
