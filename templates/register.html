<!-- templates/register.html -->
{% extends "base.html" %}
{% block content %}
<div style="max-width: 450px; margin: 2rem auto;">
    <div class="card" style="padding: 2rem;">
        <h2 style="text-align: center;">Register</h2>
        <form method="POST">
            <div class="form-group"><label>Username</label><input type="text" name="username" class="form-control" required></div>
            <div class="form-group"><label>Email</label><input type="email" name="email" class="form-control" required></div>
            <div class="form-group"><label>Password</label><input type="password" name="password" class="form-control" required></div>
            <div class="form-group"><label>Confirm Password</label><input type="password" name="confirm_password" class="form-control" required></div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
        </form>
        <p style="text-align: center; margin-top: 1rem;">Already have an account? <a href="/login">Login</a></p>
    </div>
</div>
{% endblock %}
