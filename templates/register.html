{% extends "base.html" %}

{% block title %}Register - AI Interview Coach{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto;">
    <div class="card fade-in">
        <div class="card-header">
            <h2 style="margin: 0; text-align: center;">📝 Create Account</h2>
            <p style="text-align: center; color: var(--gray-600); margin-top: 0.5rem;">
                Join thousands of job seekers preparing for interviews
            </p>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('register') }}">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="Create a password (min 6 characters)">
                    <small style="color: var(--gray-500);">Minimum 6 characters</small>
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirm_password">Confirm Password</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" required placeholder="Confirm your password">
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                    Create Account →
                </button>
            </form>
        </div>
        <div class="card-footer" style="text-align: center;">
            <p style="margin: 0;">
                Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary-color);">Login here</a>
            </p>
        </div>
    </div>
</div>

<script>
    // Password validation
    const form = document.querySelector('form');
    const password = document.getElementById('password');
    const confirm = document.getElementById('confirm_password');
    
    form.addEventListener('submit', function(e) {
        if (password.value.length < 6) {
            e.preventDefault();
            alert('Password must be at least 6 characters long');
        }
        if (password.value !== confirm.value) {
            e.preventDefault();
            alert('Passwords do not match');
        }
    });
</script>
{% endblock %}
