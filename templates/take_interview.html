{% extends "base.html" %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
    <div class="card" style="padding: 2rem;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
            <span style="background: #667eea; color: white; padding: 0.25rem 0.75rem; border-radius: 20px;">{{ role }}</span>
            <span>Question {{ num }} of {{ total }}</span>
        </div>
        
        <div style="background: #f7fafc; padding: 1.5rem; border-radius: 15px; margin-bottom: 1.5rem;">
            <h3>Question:</h3>
            <p style="font-size: 1.1rem;">{{ question }}</p>
        </div>
        
        <form id="answerForm">
            <textarea name="answer" rows="6" required placeholder="Type your detailed answer here..." style="width: 100%; padding: 1rem; border: 2px solid #e2e8f0; border-radius: 10px;"></textarea>
            <input type="hidden" name="question" value="{{ question }}">
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Submit Answer</button>
        </form>
        
        <div id="feedbackDiv" style="margin-top: 1rem;"></div>
    </div>
</div>

<script>
document.getElementById('answerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const response = await fetch('/submit-answer', { method: 'POST', body: formData });
    const data = await response.json();
    
    if (data.completed) {
        window.location.href = '/interview-complete';
    } else {
        document.getElementById('feedbackDiv').innerHTML = `
            <div style="background: ${data.score >= 70 ? '#48bb78' : data.score >= 50 ? '#f59e0b' : '#ef4444'}; color: white; padding: 1rem; border-radius: 10px;">
                <strong>Score: ${data.score}%</strong><br>
                ${data.feedback}
            </div>
        `;
        document.querySelector('textarea').value = '';
        document.querySelector('input[name="question"]').value = data.next;
        document.querySelector('h3 + p').textContent = data.next;
        document.querySelector('span:last-child').textContent = `Question ${data.num} of ${data.total}`;
        setTimeout(() => {
            document.getElementById('feedbackDiv').innerHTML = '';
        }, 3000);
    }
});
</script>
{% endblock %}
