{% extends "base.html" %}

{% block title %}Interview - AI Interview Coach{% endblock %}

{% block content %}
<div class="interview-container fade-in">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <div>
            <h2 style="margin: 0;">🎤 Mock Interview</h2>
            <p style="color: var(--gray-600); margin-top: 0.25rem;">Role: <strong>{{ role }}</strong></p>
        </div>
        <div class="score-badge score-high" style="font-size: 1rem;">
            Question {{ num }} of {{ total }}
        </div>
    </div>

    <div class="question-card">
        <div class="question-text">
            {{ question }}
        </div>
        
        <form id="answerForm">
            <textarea class="answer-input" id="answer" name="answer" placeholder="Type your answer here... Be specific and provide detailed examples. Aim for at least 3-4 sentences." rows="6"></textarea>
            <input type="hidden" id="question" value="{{ question }}">
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem;">
                <div id="wordCount" style="font-size: 0.875rem; color: var(--gray-500);"></div>
                <button type="submit" class="btn btn-primary" id="submitBtn">Submit Answer →</button>
            </div>
        </form>

        <div id="feedbackSection" style="margin-top: 1.5rem; display: none;">
            <div id="feedbackMessage" class="feedback-card"></div>
            <div id="nextSection" style="margin-top: 1rem; text-align: right;">
                <button id="nextBtn" class="btn btn-primary">Next Question →</button>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" style="display: none; text-align: center; padding: 2rem;">
        <div class="spinner" style="margin: 0 auto;"></div>
        <p style="margin-top: 1rem;">Analyzing your answer...</p>
    </div>
</div>

<script>
    const form = document.getElementById('answerForm');
    const answerInput = document.getElementById('answer');
    const submitBtn = document.getElementById('submitBtn');
    const feedbackSection = document.getElementById('feedbackSection');
    const feedbackMessage = document.getElementById('feedbackMessage');
    const nextBtn = document.getElementById('nextBtn');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const wordCount = document.getElementById('wordCount');

    // Word counter
    answerInput.addEventListener('input', function() {
        const words = this.value.trim().split(/\s+/).filter(w => w.length > 0).length;
        wordCount.textContent = `${words} words typed`;
        if (words < 5) {
            wordCount.style.color = 'var(--warning-color)';
        } else if (words < 15) {
            wordCount.style.color = 'var(--info-color)';
        } else {
            wordCount.style.color = 'var(--success-color)';
        }
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const answer = answerInput.value.trim();
        if (!answer) {
            alert('Please provide an answer before submitting.');
            return;
        }

        if (answer.split(/\s+/).length < 5) {
            alert('Please provide a more detailed answer (at least 5 words).');
            return;
        }

        // Show loading spinner
        loadingSpinner.style.display = 'block';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        const formData = new FormData();
        formData.append('answer', answer);
        formData.append('question', document.getElementById('question').value);

        try {
            const response = await fetch('{{ url_for("submit_answer") }}', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            loadingSpinner.style.display = 'none';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit Answer';

            if (data.completed) {
                // Interview completed
                feedbackMessage.innerHTML = `
                    <strong>🎉 Congratulations! You've completed the interview!</strong><br>
                    Your overall score: <strong style="font-size: 1.25rem;">${data.total}%</strong>
                `;
                feedbackMessage.classList.add('feedback-positive');
                feedbackSection.style.display = 'block';
                form.style.display = 'none';
                nextBtn.textContent = 'View Results →';
                nextBtn.onclick = () => {
                    window.location.href = '{{ url_for("interview_complete") }}';
                };
            } else {
                // Show feedback
                const scoreColor = data.score >= 70 ? '🟢' : (data.score >= 50 ? '🟡' : '🔴');
                feedbackMessage.innerHTML = `
                    <strong>${scoreColor} Score: ${data.score}%</strong><br>
                    ${data.feedback}
                `;
                if (data.score >= 70) {
                    feedbackMessage.classList.add('feedback-positive');
                } else {
                    feedbackMessage.classList.add('feedback-negative');
                }
                feedbackSection.style.display = 'block';
                
                // Setup next question
                nextBtn.onclick = () => {
                    window.location.reload();
                };
            }
        } catch (error) {
            console.error('Error:', error);
            loadingSpinner.style.display = 'none';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit Answer';
            alert('An error occurred. Please try again.');
        }
    });
</script>
{% endblock %}
