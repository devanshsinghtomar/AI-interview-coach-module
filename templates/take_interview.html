{% extends "base.html" %}

{% block title %}Interview Session - AI Interview Coach{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
    <div class="card" style="padding: 2rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <span style="background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 0.5rem 1rem; border-radius: 25px;">
                <i class="fas fa-briefcase"></i> {{ role }}
            </span>
            <span style="color: #718096;">
                <i class="fas fa-question-circle"></i> Question {{ num }} of {{ total }}
            </span>
        </div>
        
        <div style="background: #f7fafc; padding: 1.5rem; border-radius: 20px; margin-bottom: 1.5rem;">
            <h3><i class="fas fa-question"></i> Question:</h3>
            <p style="font-size: 1.1rem; line-height: 1.6; margin-top: 0.5rem;">{{ question }}</p>
        </div>
        
        <form id="answerForm">
            <div class="form-group">
                <label class="form-label"><i class="fas fa-edit"></i> Your Answer:</label>
                <textarea name="answer" rows="8" required placeholder="Type your detailed answer here... Be specific and provide examples!" style="width: 100%; padding: 1rem; border: 2px solid #e2e8f0; border-radius: 12px; font-family: inherit;"></textarea>
            </div>
            <input type="hidden" name="question" value="{{ question }}">
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fas fa-paper-plane"></i> Submit Answer
            </button>
        </form>
        
        <div id="feedbackDiv" style="margin-top: 1.5rem;"></div>
    </div>
</div>

<script>
document.getElementById('answerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const submitBtn = e.target.querySelector('button');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
    
    const response = await fetch('/submit-answer', { method: 'POST', body: formData });
    const data = await response.json();
    
    if (data.completed) {
        window.location.href = '/interview-complete';
    } else {
        const feedbackDiv = document.getElementById('feedbackDiv');
        const bgColor = data.score >= 70 ? '#48bb78' : (data.score >= 50 ? '#ed8936' : '#ef4444');
        feedbackDiv.innerHTML = `
            <div style="background: ${bgColor}; color: white; padding: 1rem; border-radius: 12px;">
                <i class="fas fa-chart-line"></i> <strong>Score: ${data.score}%</strong>
                <p style="margin-top: 0.5rem;">${data.feedback}</p>
            </div>
        `;
        
        document.querySelector('textarea').value = '';
        document.querySelector('input[name="question"]').value = data.next;
        document.querySelector('h3 + p').textContent = data.next;
        document.querySelector('span:last-child').innerHTML = `<i class="fas fa-question-circle"></i> Question ${data.num} of ${data.total}`;
        
        setTimeout(() => {
            feedbackDiv.innerHTML = '';
        }, 3000);
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Answer';
    }
});
</script>
{% endblock %}
