{% extends "base.html" %}

{% block title %}Quiz - AI Interview Coach{% endblock %}

{% block content %}
<div class="interview-container fade-in">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <div>
            <h2 style="margin: 0;">🧠 {{ category }} Quiz</h2>
        </div>
        <div class="score-badge score-high" style="font-size: 1rem;">
            Question {{ num }} of {{ total }}
        </div>
    </div>

    <div class="question-card">
        <div class="question-text">
            {{ question.question }}
        </div>
        
        <div id="optionsContainer">
            {% for option in question.options %}
                <button class="option-btn" onclick="selectOption('{{ option }}')">
                    {{ option }}
                </button>
            {% endfor %}
        </div>

        <div id="feedbackSection" style="margin-top: 1.5rem; display: none;">
            <div id="feedbackMessage" class="feedback-card"></div>
            <div id="nextSection" style="margin-top: 1rem; text-align: right;">
                <button id="nextBtn" class="btn btn-primary">Next Question →</button>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" style="display: none; text-align: center; padding: 2rem;">
        <div class="spinner" style="margin: 0 auto;"></div>
    </div>
</div>

<style>
    .option-btn {
        width: 100%;
        text-align: left;
        padding: 1rem;
        margin-bottom: 0.75rem;
        border: 2px solid var(--gray-200);
        border-radius: var(--radius);
        background: white;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 1rem;
    }
    .option-btn:hover {
        border-color: var(--primary-color);
        background: var(--gray-50);
        transform: translateX(4px);
    }
    .option-btn.correct {
        background: #d1fae5;
        border-color: var(--secondary-color);
    }
    .option-btn.incorrect {
        background: #fee2e2;
        border-color: var(--danger-color);
    }
    .option-btn.disabled {
        cursor: not-allowed;
        opacity: 0.7;
    }
</style>

<script>
    const questionData = {{ question | tojson }};
    const category = '{{ category }}';
    let currentNum = {{ num }};
    let total = {{ total }};
    let answered = false;

    function selectOption(selected) {
        if (answered) return;
        answered = true;
        
        const isCorrect = (selected === questionData.correct);
        
        // Highlight all options
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.classList.add('disabled');
            if (btn.textContent === questionData.correct) {
                btn.classList.add('correct');
            }
            if (btn.textContent === selected && !isCorrect) {
                btn.classList.add('incorrect');
            }
        });
        
        // Show feedback
        const feedbackDiv = document.getElementById('feedbackSection');
        const feedbackMessage = document.getElementById('feedbackMessage');
        
        if (isCorrect) {
            feedbackMessage.innerHTML = `
                <strong>✅ Correct!</strong><br>
                ${questionData.explanation}
            `;
            feedbackMessage.classList.add('feedback-positive');
        } else {
            feedbackMessage.innerHTML = `
                <strong>❌ Incorrect</strong><br>
                Correct answer: ${questionData.correct}<br>
                ${questionData.explanation}
            `;
            feedbackMessage.classList.add('feedback-negative');
        }
        
        feedbackDiv.style.display = 'block';
        
        // Submit answer to server
        submitAnswer(selected, isCorrect);
    }
    
    async function submitAnswer(answer, isCorrect) {
        const loadingSpinner = document.getElementById('loadingSpinner');
        loadingSpinner.style.display = 'block';
        
        try {
            const response = await fetch('{{ url_for("submit_quiz") }}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    answer: answer,
                    correct: questionData.correct,
                    question: questionData.question,
                    explanation: questionData.explanation
                })
            });
            
            const data = await response.json();
            loadingSpinner.style.display = 'none';
            
            if (data.completed) {
                // Quiz completed - show results
                const nextBtn = document.getElementById('nextBtn');
                nextBtn.textContent = 'View Results →';
                nextBtn.onclick = () => {
                    window.location.href = '{{ url_for("quiz_complete") }}';
                };
            } else {
                // Setup next question
                const nextBtn = document.getElementById('nextBtn');
                nextBtn.onclick = () => {
                    window.location.reload();
                };
            }
        } catch (error) {
            console.error('Error:', error);
            loadingSpinner.style.display = 'none';
            alert('An error occurred. Please try again.');
        }
    }
</script>
{% endblock %}
