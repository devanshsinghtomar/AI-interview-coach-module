{% extends "base.html" %}

{% block content %}
<div style="max-width: 700px; margin: 0 auto;">
    <div class="card" style="padding: 2rem;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
            <span style="background: #667eea; color: white; padding: 0.25rem 0.75rem; border-radius: 20px;">{{ category }}</span>
            <span>Question {{ num }} of {{ total }}</span>
        </div>
        
        <h3 style="margin-bottom: 1rem;">{{ question.question }}</h3>
        
        <div id="options">
            {% for option in question.options %}
            <div class="option" data-value="{{ option }}" style="padding: 1rem; margin-bottom: 0.75rem; border: 2px solid #e2e8f0; border-radius: 10px; cursor: pointer;">
                {{ option }}
            </div>
            {% endfor %}
        </div>
        
        <button id="submitBtn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" disabled>Submit</button>
        <div id="feedbackDiv" style="margin-top: 1rem;"></div>
    </div>
</div>

<script>
let selected = null;
document.querySelectorAll('.option').forEach(opt => {
    opt.onclick = () => {
        document.querySelectorAll('.option').forEach(o => o.style.background = 'white');
        opt.style.background = '#667eea20';
        selected = opt.dataset.value;
        document.getElementById('submitBtn').disabled = false;
    };
});

document.getElementById('submitBtn').onclick = async () => {
    if (!selected) return;
    const response = await fetch('/submit-quiz', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            answer: selected,
            correct: '{{ question.correct }}',
            question: '{{ question.question }}',
            explanation: '{{ question.explanation }}'
        })
    });
    const data = await response.json();
    if (data.completed) {
        window.location.href = '/quiz-complete';
    } else {
        window.location.reload();
    }
};
</script>
{% endblock %}
