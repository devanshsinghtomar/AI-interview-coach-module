<div class="bg-white rounded-xl shadow-md p-6">
    <h2 class="text-2xl font-bold text-gray-800 mb-4">📊 Performance Analytics</h2>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div><canvas id="progressChart"></canvas></div><div><canvas id="pieChart"></canvas></div></div>
</div>
<script>
let progressChart,pieChart;
function updateAllCharts(){if(window.progressChart&&window.pieChart){window.progressChart.update();window.pieChart.update();}}
document.addEventListener('DOMContentLoaded',function(){const ctx1=document.getElementById('progressChart').getContext('2d');const ctx2=document.getElementById('pieChart').getContext('2d');const data=localStorage.getItem('dashboardData');let mock=0,resume=0,quiz=0;if(data){const d=JSON.parse(data);mock=d.mockCount||0;resume=d.resumeCount||0;quiz=d.quizCount||0;}window.progressChart=new Chart(ctx1,{type:'line',data:{labels:['Week 1','Week 2','Week 3','Week 4'],datasets:[{label:'Mock Interviews',data:[mock*0.2,mock*0.4,mock*0.7,mock],borderColor:'#3b82f6'},{label:'Resume Analysis',data:[resume*0.2,resume*0.4,resume*0.7,resume],borderColor:'#8b5cf6'},{label:'Quizzes',data:[quiz*0.2,quiz*0.4,quiz*0.7,quiz],borderColor:'#f97316'}]}});window.pieChart=new Chart(ctx2,{type:'pie',data:{labels:['Mock Interviews','Resume Analysis','Quizzes'],datasets:[{data:[mock,resume,quiz],backgroundColor:['#3b82f6','#8b5cf6','#f97316']}]}});});
</script>
