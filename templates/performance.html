<!DOCTYPE html>
<html>
<head>
<title>Performance</title>
</head>
<body>

<h2>Your Interview History</h2>

{% for item in records %}

<div>

<h3>{{ item.role }}</h3>

<p><b>Question:</b></p>
<p>{{ item.question }}</p>

<p><b>Answer:</b></p>
<p>{{ item.answer }}</p>

<p><b>Feedback:</b></p>
<p>{{ item.feedback }}</p>

<hr>

</div>

{% endfor %}

</body>
</html>
