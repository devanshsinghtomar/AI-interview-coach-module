{% extends "base.html" %}

{% block content %}
<div>
    <h1>📈 Performance Analytics</h1>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin: 2rem 0;">
        <div class="card" style="text-align: center;">
            <div style="font-size: 2rem; font-weight: bold; color: #667eea;">{{ interviews|length }}</div>
            <div>Interviews</div>
        </div>
        <div class="card" style="text-align: center;">
            <div style="font-size: 2rem; font-weight: bold; color: #667eea;">{{ quizzes|length }}</div>
            <div>Quizzes</div>
        </div>
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin: 2rem 0;">
        <div class="card">
            <h3>Interview Scores Trend</h3>
            <canvas id="interviewChart"></canvas>
        </div>
        <div class="card">
            <h3>Quiz Scores Trend</h3>
            <canvas id="quizChart"></canvas>
        </div>
    </div>
    
    <div class="card">
        <h3>Performance by Role</h3>
        <canvas id="pieChart" style="max-width: 400px; margin: 0 auto;"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const interviewData = {{ interview_data|safe }};
    const quizData = {{ quiz_data|safe }};
    const roleData = {{ role_performance|tojson|safe }};
    
    new Chart(document.getElementById('interviewChart'), {
        type: 'line',
        data: {
            labels: interviewData.dates,
            datasets: [{ label: 'Score %', data: interviewData.scores, borderColor: '#667eea', fill: false }]
        }
    });
    
    new Chart(document.getElementById('quizChart'), {
        type: 'line',
        data: {
            labels: [{% for q in quizzes %}'{{ q.date.strftime("%Y-%m-%d") }}',{% endfor %}],
            datasets: [{ label: 'Score %', data: [{% for q in quizzes %}{{ q.score }},{% endfor %}], borderColor: '#48bb78', fill: false }]
        }
    });
    
    new Chart(document.getElementById('pieChart'), {
        type: 'pie',
        data: {
            labels: Object.keys(roleData),
            datasets: [{ data: Object.values(roleData), backgroundColor: ['#667eea', '#48bb78', '#f59e0b', '#ef4444', '#8b5cf6'] }]
        }
    });
</script>
{% endblock %}
