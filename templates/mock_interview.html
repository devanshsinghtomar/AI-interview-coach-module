{% extends "base.html" %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="card" style="padding: 2rem;">
        <h2 style="text-align: center;">🎤 Mock Interview</h2>
        <p style="text-align: center; color: #666; margin-bottom: 2rem;">Select a role to practice</p>
        
        <form method="POST" action="/start-mock-interview">
            <select name="role" required style="width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 2px solid #e2e8f0; border-radius: 10px;">
                {% for role in roles %}
                <option value="{{ role }}">{{ role }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Start Interview →</button>
        </form>
    </div>
</div>
{% endblock %}
