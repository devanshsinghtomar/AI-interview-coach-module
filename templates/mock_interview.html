<div class="bg-white rounded-xl shadow-md p-6">
    <h2 class="text-2xl font-bold text-gray-800 mb-4">🎤 Mock Interview</h2>
    <div class="mb-4"><label class="block text-gray-700 mb-2">Select Interview Mode:</label><select id="interviewMode" class="w-full p-2 border rounded-lg"><option value="technical">Technical Interview</option><option value="behavioral">Behavioral Interview</option><option value="general">General Interview</option></select></div>
    <div class="mb-4"><button onclick="startListening()" class="bg-green-500 text-white px-6 py-2 rounded-lg hover:bg-green-600"><i class="fas fa-microphone mr-2"></i>Speak Answer</button><button onclick="speakQuestion()" class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 ml-2"><i class="fas fa-volume-up mr-2"></i>Read Question</button></div>
    <div class="mb-4"><p class="text-gray-700 font-semibold">Current Question:</p><p id="currentQuestion" class="text-gray-600 bg-gray-50 p-3 rounded-lg">Click "Start Interview" to begin</p></div>
    <div class="mb-4"><button onclick="startInterview()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">Start Interview</button><button onclick="nextQuestion()" class="bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700 ml-2">Next Question</button></div>
    <div><h3 class="font-semibold mb-2">Feedback:</h3><div id="feedback" class="bg-gray-50 p-3 rounded-lg text-gray-600">Your feedback will appear here</div></div>
</div>
<script>
const questions={technical:["Explain the difference between let, const, and var","What is a closure in JavaScript?","Explain the event loop","What is responsive design?"],behavioral:["Tell me about a time you faced a challenge","Describe a successful team project","How do you handle deadlines?","Tell me about a leadership experience"],general:["Why do you want this role?","What are your strengths and weaknesses?","Where do you see yourself in 5 years?","Why should we hire you?"]};
let currentQIndex=0,currentMode='technical',interviewActive=false;
const speechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
let recognition=speechRecognition?new speechRecognition():null;
function startInterview(){currentMode=document.getElementById('interviewMode').value;currentQIndex=0;interviewActive=true;loadQuestion();window.incrementMock();addActivity(`Started ${currentMode} mock interview`,'interview');}
function loadQuestion(){if(interviewActive&&currentQIndex<questions[currentMode].length){document.getElementById('currentQuestion').innerText=questions[currentMode][currentQIndex];document.getElementById('feedback').innerHTML='<span class="text-blue-500">🎤 Click "Speak Answer" and say your answer...</span>';}else if(interviewActive){document.getElementById('feedback').innerHTML='<span class="text-green-500">✅ Interview completed! Great job!</span>';interviewActive=false;}}
function nextQuestion(){if(interviewActive&&currentQIndex<questions[currentMode].length-1){currentQIndex++;loadQuestion();}else if(interviewActive){document.getElementById('feedback').innerHTML='<span class="text-green-500">🎉 Interview finished! Well done!</span>';interviewActive=false;}}
function speakQuestion(){const q=document.getElementById('currentQuestion').innerText;if(q&&q!="Click 'Start Interview' to begin"){const utterance=new SpeechSynthesisUtterance(q);window.speechSynthesis.speak(utterance);}}
function startListening(){if(!recognition){document.getElementById('feedback').innerHTML='<span class="text-red-500">❌ Speech recognition not supported</span>';return;}recognition.start();recognition.onresult=(event)=>{const transcript=event.results[0][0].transcript;document.getElementById('feedback').innerHTML=`<span class="text-green-500">✅ Your answer: "${transcript}"<br>💡 Tip: Be more specific and use examples from your experience.</span>`;};recognition.onerror=()=>{document.getElementById('feedback').innerHTML='<span class="text-red-500">❌ Could not hear you. Check your microphone.</span>';};}
</script>
