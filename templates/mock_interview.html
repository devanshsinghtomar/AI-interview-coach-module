{% extends "base.html" %}

{% block title %}Mock Interview - AI Interview Coach{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="card" style="padding: 2rem;">
        <h2 style="text-align: center; margin-bottom: 1rem;">🎤 Start Mock Interview</h2>
        <p style="text-align: center; color: #666; margin-bottom: 2rem;">Choose your role to begin the interview practice</p>
        
        <form method="POST" action="/start-mock-interview">
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Select Job Role</label>
                <select name="role" required style="width: 100%; padding: 0.75rem; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem;">
                    {% for role in roles %}
                    <option value="{{ role }}">{{ role }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Start Interview →</button>
        </form>
    </div>
</div>
{% endblock %}
