{% extends "base.html" %}

{% block title %}Mock Interview - AI Interview Coach{% endblock %}

{% block content %}
<div style="max-width: 700px; margin: 0 auto;">
    <div class="card" style="padding: 2rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="fas fa-microphone-alt" style="font-size: 3rem; color: #667eea;"></i>
            <h2>Mock Interview</h2>
            <p style="color: #718096;">Select a role to start practicing</p>
        </div>
        
        <form method="POST" action="/start-mock-interview">
            <div class="form-group">
                <label class="form-label"><i class="fas fa-briefcase"></i> Select Job Role</label>
                <select name="role" required style="width: 100%; padding: 0.75rem; border-radius: 12px; border: 2px solid #e2e8f0;">
                    <option value="">-- Choose a role --</option>
                    {% for role in roles %}
                    <option value="{{ role }}">{{ role }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div style="background: #f7fafc; padding: 1rem; border-radius: 16px; margin: 1.5rem 0;">
                <div class="grid grid-3" style="text-align: center;">
                    <div>
                        <i class="fas fa-question-circle" style="font-size: 1.5rem; color: #667eea;"></i>
                        <div>6 Questions</div>
                    </div>
                    <div>
                        <i class="fas fa-clock" style="font-size: 1.5rem; color: #667eea;"></i>
                        <div>10-15 min</div>
                    </div>
                    <div>
                        <i class="fas fa-chart-line" style="font-size: 1.5rem; color: #667eea;"></i>
                        <div>AI Scoring</div>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fas fa-play"></i> Start Interview
            </button>
        </form>
    </div>
</div>
{% endblock %}
